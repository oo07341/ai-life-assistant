<section class="workflow-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">🚀 使用流程</h2>
      <p class="section-subtitle">简单三步，快速体验AI生活助手</p>
    </div>

    <div class="workflow-steps">
      <!-- 步骤1 -->
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <h3 class="step-title">输入需求</h3>
          <p class="step-description">
            在比价页面输入您的购物需求，或在日程页面描述您的日程安排
          </p>
          <div class="step-example">
            <div class="example-bubble">我想吃披萨</div>
            <div class="example-bubble">明天下午开会</div>
          </div>
        </div>
      </div>

      <!-- 步骤2 -->
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <h3 class="step-title">AI分析</h3>
          <p class="step-description">
            AI智能分析您的意图，生成比价结果或日程安排
          </p>
          <div class="step-visual">
            <div class="ai-processing">
              <div class="ai-icon">🤖</div>
              <div class="processing-text">AI分析中...</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 步骤3 -->
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <h3 class="step-title">获取结果</h3>
          <p class="step-description">
            查看比价推荐或下载日历文件，完成您的需求
          </p>
          <div class="step-result">
            <div class="result-item">
              <el-icon><ShoppingCart /></el-icon>
              <span>比价结果</span>
            </div>
            <div class="result-item">
              <el-icon><Calendar /></el-icon>
              <span>日历文件</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="workflow-actions">
      <el-button type="primary" size="large" @click="$router.push('/price')">
        开始体验
      </el-button>
      <el-button type="text" @click="showDemo">
        <el-icon><VideoPlay /></el-icon>
        观看演示
      </el-button>
    </div>
  </div>
</section>
