<section class="features-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">✨ 核心功能</h2>
      <p class="section-subtitle">两大AI功能，满足您的日常生活需求</p>
    </div>

    <div class="features-grid">
      <!-- 功能1：AI智能比价 -->
      <div class="feature-card">
        <div class="feature-icon">
          <el-icon><ShoppingCart /></el-icon>
        </div>
        <h3 class="feature-title">AI智能比价</h3>
        <p class="feature-description">
          输入您的购物需求，AI分析意图并为您推荐最佳购买方案，支持多平台比价
        </p>
        <ul class="feature-list">
          <li>智能意图分析</li>
          <li>多平台价格对比</li>
          <li>历史价格趋势</li>
          <li>购买建议推荐</li>
        </ul>
        <el-button type="primary" @click="$router.push('/price')">
          开始比价
        </el-button>
      </div>

      <!-- 功能2：AI日程规划 -->
      <div class="feature-card">
        <div class="feature-icon">
          <el-icon><Calendar /></el-icon>
        </div>
        <h3 class="feature-title">AI日程规划</h3>
        <p class="feature-description">
          描述您的日程需求，AI为您生成完整的日程安排，并导出为日历文件
        </p>
        <ul class="feature-list">
          <li>智能日程生成</li>
          <li>时间冲突检测</li>
          <li>日历文件导出</li>
          <li>多设备同步</li>
        </ul>
        <el-button type="success" @click="$router.push('/schedule')">
          规划日程
        </el-button>
      </div>

      <!-- 功能3：个人中心 -->
      <div class="feature-card">
        <div class="feature-icon">
          <el-icon><User /></el-icon>
        </div>
        <h3 class="feature-title">个人中心</h3>
        <p class="feature-description">
          管理您的历史记录、个性化设置和使用偏好，获得更好的使用体验
        </p>
        <ul class="feature-list">
          <li>历史记录查看</li>
          <li>个性化设置</li>
          <li>使用偏好配置</li>
          <li>数据统计</li>
        </ul>
        <el-button type="info" @click="$router.push('/profile')">
          个人中心
        </el-button>
      </div>
    </div>
  </div>
</section>
